version: '3.9'

services:

  #  backend:
  #    build: .
  #    ports:
  #      - "1337:1337"
  #    volumes:
  #      - .:/deejay/server
  #    depends_on:
  #      - mongodb
  #      - mongodb-seed
  #      - redis
    
  mongodb:
    image: mongo:5
    container_name: mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: $MONGODB_USERNAME
      MONGO_INITDB_ROOT_PASSWORD: $MONGODB_PASSWORD
      MONGO_INITDB_DATABASE: deejay
    ports:
      - '27017:27017'

  mongodb-seed:
    image: mongo:5
    container_name: mongodb-seed
    depends_on:
      - mongodb
    volumes:
      - ./server/mongodb-init:/mongodb-init
    links:
      - mongodb
    command:
      mongoimport --host mongodb --db deejay --collection dj_login --authenticationDatabase admin --username $MONGODB_USERNAME --password $MONGODB_PASSWORD --drop --jsonArray --file /mongodb-init/init.json

  redis:
    image: redis:alpine
    container_name: redis
    restart: always
    ports:
      - '6379:6379'
